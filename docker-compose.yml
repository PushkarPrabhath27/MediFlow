version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mediflow_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-mediflow}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mediflow_secret}
      POSTGRES_DB: ${DB_NAME:-mediflow_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-mediflow} -d ${DB_NAME:-mediflow_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mediflow_network

  redis:
    image: redis:7-alpine
    container_name: mediflow_redis
    command: ["redis-server", "--notify-keyspace-events", "KEA"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mediflow_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mediflow_backend
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER:-mediflow}
      - DB_PASSWORD=${DB_PASSWORD:-mediflow_secret}
      - DB_NAME=${DB_NAME:-mediflow_db}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET:-super_secret_key_change_me_in_production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - mediflow_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mediflow_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - mediflow_network

networks:
  mediflow_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
